<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>我的打卡</title>
<style>
/* ======== 全局重置 ======== */
*{ margin:0; padding:0; box-sizing: border-box; }
body{
font-family:-apple-system, BlinkMacSystemFont,"Segoe UI", Roboto,sans-serif;
padding:20px;
max-width:700px;
margin:0 auto;
background:#f5f5f5;
color:#333;
}
h1{ text-align: center; margin-bottom:15px; font-size:24px; }
/* ======== 标签导航 ======== */
.tabs{
display: flex;
gap:8px;
margin-bottom:15px;
justify-content: center;
}
.tab-btn{
flex:1;
padding:10px 0;
border: none;
background:#ddd;
border-radius:8px;
font-size:16px;
cursor: pointer;
transition:0.2s;
font-weight:500;
}
.tab-btn.active{ background:#4caf50; color:white; }
.tab-content{ display: none; }
.tab-content.active{ display: block; }
/* ======== 通用卡片 ======== */
.card{
background:white;
border-radius:12px;
padding:12px 14px;
margin-bottom:10px;
box-shadow:0 1px 4px rgba(0,0,0,0.08);
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
transition:0.2s;
}
.card .info{ flex:1; min-width:150px; }
.card .actions{ display: flex; gap:6px; flex-wrap: wrap; align-items: center; }
.card .name{ font-weight:600; font-size:16px; }
.card .meta{ font-size:12px; color:#888; margin-top:2px; }
/* 按钮样式 */
button{
padding:6px 12px;
border: none;
border-radius:6px;
cursor: pointer;
font-size:13px;
background:#4caf50;
color:white;
transition:0.2s;
}
button:hover{ opacity:0.85; }
button.danger{ background:#f44336; }
button.primary{ background:#2196f3; }
button.outline{ background: transparent; border:1px solid #ccc; color:#333; }
/* 输入框 */
input,textarea,select{
width:100%;
padding:8px 10px;
margin:4px 0;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}
textarea{ resize: vertical; min-height:60px; }
select{ width: auto; }
/* ======== 日历样式 ======== */
.calendar-container{ margin-top:10px; }
.calendar-header{
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom:10px;
}
.calendar-header h3{ font-size:18px; }
.calendar-grid{
display: grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
text-align: center;
}
.calendar-day{
aspect-ratio:1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
border-radius:8px;
background:white;
font-size:14px;
font-weight:500;
cursor: pointer;
position: relative;
}
.calendar-day.other-month{ color:#ccc; }
.calendar-day.today{ background:#fff3e0; font-weight: bold; }
.calendar-day.checked{ background:#e8f5e9; color:#2e7d32; }
.calendar-day.missed{ background:#fce4ec; color:#c62828; }
.calendar-day.partial{ background:#fff8e1; color:#f57f17; }
.calendar-day .badge{ font-size:9px; margin-top:2px; opacity:0.7; }
/* ======== 弹出层 ======== */
.modal-overlay{
position: fixed;
top:0; left:0; right:0; bottom:0;
background:rgba(0,0,0,0.3);
display: none;
justify-content: center;
align-items: center;
z-index:1000;
}
.modal-overlay.show{ display: flex; }
.modal-content{
background:white;
border-radius:16px;
padding:20px;
max-width:90%;
width:400px;
max-height:80vh;
overflow-y: auto;
}
.modal-content h3{ margin-bottom:5px; }
.modal-content .close-btn{
float: right;
background: none;
border: none;
font-size:24px;
cursor: pointer;
color:#999;
}
.mood-buttons{
display: flex;
gap:8px;
justify-content: center;
margin:12px 0;
flex-wrap: wrap;
}
.mood-btn{
font-size:28px;
padding:6px 8px;
background:#f0f0f0;
border-radius:12px;
cursor: pointer;
transition:0.2s;
border:2px solid transparent;
}
.mood-btn.selected{ border-color:#4caf50; background:#e8f5e9; }
.mood-btn:hover{ background:#e0e0e0; }
/* 记录列表 */
.record-item{
border-bottom:1px solid #eee;
padding:8px 0;
font-size:14px;
}
.record-item .header{
display: flex;
justify-content: space-between;
align-items: center;
}
.record-item .mood{ font-size:20px; margin-right:6px; }
.record-item .duration{ color:#888; font-size:13px; }
.record-item .note{ margin-top:4px; color:#555; font-style: italic; font-size:13px; }
/* ======== TODO额外样式 ======== */
.todo-deadline{ font-size:12px; color:#888; }
.todo-done{ text-decoration: line-through; color:#4caf50; }
.todo-overdue{ color:#f44336; }
.todo-expiring{ color:#ff9800; }
/* ======== 工具类 ======== */
.flex-between{ display: flex; justify-content: space-between; align-items: center; }
.mt-10{ margin-top:10px; }
.mb-10{ margin-bottom:10px; }
.text-center{ text-align: center; }
.hidden{ display: none; }
.inline-flex{ display: inline-flex; align-items: center; gap:4px; }
.small-gray{ font-size:13px; color:#999; margin-bottom:10px; }
@media(max-width:480px) {
.card{ flex-direction: column; align-items: flex-start; gap:6px; }
.calendar-day{ font-size:12px; }
}
/* ======== 侧边栏 ======== */
.sidebar-toggle{
position: fixed;
top:15px;
left:15px;
z-index:500;
background: transparent;
color:#333;
border: none;
border-radius:8px;
width:40px;
height:40px;
font-size:24px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: left 0.3s;
}
.sidebar-toggle.open{ left:265px; }
.sidebar-overlay{
position: fixed;
top:0; left:0; right:0; bottom:0;
background:rgba(0,0,0,0.3);
z-index:400;
display: none;
}
.sidebar-overlay.show{ display: block; }
.sidebar{
position: fixed;
top:0; left:-280px;
width:260px;
height:100%;
background:white;
z-index:450;
box-shadow:2px 0 12px rgba(0,0,0,0.15);
transition: left 0.3s;
overflow-y: auto;
padding:20px 16px;
}
.sidebar.open{ left:0; }
.sidebar h2{ font-size:20px; margin-bottom:16px; color:#333; }
.sidebar .menu-item{
padding:12px 10px;
border-radius:8px;
cursor: pointer;
font-size:16px;
transition:0.2s;
margin-bottom:4px;
display: flex;
align-items: center;
gap:8px;
}
.sidebar .menu-item:hover{ background:#f0f0f0; }
.sidebar .menu-item.active{ background:#e8f5e9; color:#2e7d32; font-weight:600; }
/* ======== 全屏覆盖层 ======== */
.fullscreen-overlay{
position: fixed;
top:0; left:0; right:0; bottom:0;
background:white;
z-index:2000;
display: none;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding:20px;
overflow-y: auto;
}
.fullscreen-overlay.show{ display: flex; }
.fullscreen-overlay .fs-header{
width:100%;
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom:20px;
}
.fullscreen-overlay .fs-header h2{ font-size:22px; }
.fullscreen-overlay .fs-close{
background: none;
border: none;
font-size:28px;
cursor: pointer;
color:#999;
padding:4px 8px;
}
.fullscreen-overlay .fs-body{
width:100%;
max-width:500px;
display: flex;
flex-direction: column;
align-items: center;
}
.fullscreen-overlay input.fs-input{
width:100%;
padding:12px 14px;
font-size:16px;
border:2px solid #ddd;
border-radius:10px;
margin-bottom:16px;
}
.fullscreen-overlay input.fs-input:focus{ border-color:#4caf50; outline: none; }
.fs-btn{
padding:12px 24px;
border: none;
border-radius:10px;
font-size:16px;
cursor: pointer;
font-weight:600;
transition:0.2s;
}
.fs-btn.primary{ background:#4caf50; color:white; }
.fs-btn.secondary{ background:#2196f3; color:white; }
.fs-btn.outline{ background: transparent; border:2px solid #4caf50; color:#4caf50; }
.fs-btn.danger{ background:#f44336; color:white; }
.fs-btn:hover{ opacity:0.85; }
.fs-btn:disabled{ opacity:0.4; cursor: not-allowed; }
/* 计时器样式 */
.timer-display{
font-size:48px;
font-weight: bold;
font-family:monospace;
color:#333;
margin:20px 0;
letter-spacing:4px;
}
.timer-options{
display: flex;
gap:10px;
flex-wrap: wrap;
justify-content: center;
margin:16px 0;
}
.timer-opt{
padding:10px 18px;
border-radius:20px;
border:2px solid #4caf50;
background:white;
color:#4caf50;
font-size:15px;
font-weight:600;
cursor: pointer;
transition:0.2s;
}
.timer-opt.selected{ background:#4caf50; color:white; }
.timer-opt:hover{ background:#e8f5e9; }
/* 进度条倒计时 */
.timer-bar{
width:100%;
height:8px;
background:#e0e0e0;
border-radius:4px;
margin:8px 0;
overflow: hidden;
}
.timer-bar-inner{
height:100%;
background:#4caf50;
border-radius:4px;
transition: width 1s linear;
}
/* 记录详情卡片 */
.record-detail-card{
background:#f9f9f9;
border-radius:12px;
padding:14px;
margin:8px 0;
width:100%;
}
.record-detail-card .rd-row{
display: flex;
justify-content: space-between;
padding:4px 0;
font-size:14px;
}
.record-detail-card .rd-label{ color:#888; }
</style>
</head>
<body>
<!-- 侧边栏按钮 -->
<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<!-- 侧边栏遮罩 -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<!-- 侧边栏 -->
<div class="sidebar" id="sidebar">
<h2>记录</h2>
<div class="menu-item" data-sidemenu="record">📝 记录</div>
</div>
<h1>📅 我的打卡</h1>
<!-- 标签导航 -->
<div class="tabs">
<button class="tab-btn active" data-tab="calendar">📆 日历</button>
<button class="tab-btn" data-tab="checkin">✅ 打卡</button>
<button class="tab-btn" data-tab="todo">📋 TODO</button>
</div>
<!-- ==================== 日历标签 ==================== -->
<div id="calendar" class="tab-content active">
<div class="calendar-header">
<button class="outline" id="prevMonth">◀</button>
<h3 id="monthTitle">2026年6月</h3>
<button class="outline" id="nextMonth">▶</button>
</div>
<div class="calendar-grid" id="calendarGrid">
<!-- 由JS生成 -->
</div>
<div id="dayDetail" style="margin-top: 12px;">
<p style="color:#888; text-align:center;">点击日期查看详细记录</p>
</div>
</div>
<!-- ==================== 打卡标签 ==================== -->
<div id="checkin" class="tab-content">
<div class="flex-between mb-10">
<input type="text" id="newCheckinName" placeholder="新打卡名称" style="flex:1; margin-right:8px;"/>
<button id="addCheckinBtn">添加</button>
</div>
<div id="checkinList"></div>
</div>
<!-- ==================== TODO标签 ==================== -->
<div id="todo" class="tab-content">
<div class="flex-between mb-10">
<input type="text" id="newTodoText" placeholder="新任务" style="flex:1; margin-right:8px;"/>
<select id="todoDeadlineSelect">
<option value="today">今天</option>
<option value="tomorrow">明天</option>
<option value="dayafter">后天</option>
<option value="week">一周内</option>
<option value="custom">自定义日期</option>
</select>
<input type="date" id="todoDeadlineCustom" class="hidden" style="width:auto; margin-left:6px;"/>
<button id="addTodoBtn">添加</button>
</div>
<div id="todoList"></div>
</div>
<!-- ==================== 全局模态框 ==================== -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal-content">
<button class="close-btn" id="modalClose">&times;</button>
<div id="modalBody"></div>
</div>
</div>
<!-- ==================== 全屏覆盖层：记录 ==================== -->
<div class="fullscreen-overlay" id="freeRecordOverlay">
<div class="fs-header">
<h2 id="freeRecordTitle">📝 记录</h2>
<button class="fs-close" id="freeRecordClose">&times;</button>
</div>
<div class="fs-body" id="freeRecordBody">
<!-- 动态内容 -->
</div>
</div>
<script>
// ============================================================
// 1. 数据模型 & localStorage
// ============================================================
let data = {
checkins: [],
todos: [],
freeRecords: []
};
function loadData() {
const raw = localStorage.getItem('fullCheckinData');
if (raw) {
data = JSON.parse(raw);
data.checkins.forEach(c=>{if(!c.history) c.history=[]; });
data.todos.forEach(t=>{if(!t.history) t.history=[]; if(!t.createdDate) t.createdDate=today(); });
if (!data.freeRecords) data.freeRecords = [];
}
}
function saveData() {
localStorage.setItem('fullCheckinData', JSON.stringify(data));
}
function today() { return new Date().toISOString().split('T')[0]; }
function nowTime() {
const d = new Date();
return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function nowTimeFull() {
const d = new Date();
return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
}
function nowDateObj() { return new Date(); }
function genId() { return Date.now()+Math.random(); }
function monthDays(year, month) {
return new Date(year, month, 0).getDate();
}
function firstDayOfMonth(year, month) {
return new Date(year, month-1, 1).getDay();
}
function formatDate(y, m, d) { return y+'-'+(m+'').padStart(2,'0')+'-'+(d+'').padStart(2,'0'); }
function formatDuration(minutes) {
if (!minutes || minutes<=0) return '';
const h = Math.floor(minutes/60);
const m = minutes%60;
if (h>0 && m>0) return h+'h'+m+'min';
if (h>0) return h+'h';
return m+'min';
}
function formatDurationFull(seconds) {
if (!seconds || seconds<=0) return '0h0min';
const h = Math.floor(seconds/3600);
const m = Math.floor((seconds%3600)/60);
if (h>0 && m>0) return h+'h'+m+'min';
if (h>0) return h+'h';
return m+'min';
}
function getBeijingNow() {
const d = new Date();
return d.getHours()*60 + d.getMinutes();
}
// ============================================================
// 2. 日历渲染
// ============================================================
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth()+1;
function renderCalendar() {
const grid = document.getElementById('calendarGrid');
const title = document.getElementById('monthTitle');
title.textContent = currentYear+'年'+currentMonth+'月';
const daysInMonth = monthDays(currentYear, currentMonth);
const firstDay = firstDayOfMonth(currentYear, currentMonth);
const prevMonthDays = monthDays(currentYear, currentMonth-1);
const checkedDates = new Set();
data.checkins.forEach(c=>{
c.history.forEach(h=>{ checkedDates.add(h.date); });
});
data.todos.forEach(t=>{
t.history.forEach(h=>{ checkedDates.add(h.date); });
if (t.done && t.history.length===0 && t.createdDate) checkedDates.add(t.createdDate);
});
data.freeRecords.forEach(r=>{
checkedDates.add(r.date);
});
let html = '';
const weekDays = ['日','一','二','三','四','五','六'];
weekDays.forEach(d=>html+=`<div style="font-weight:bold;padding:4px;">${d}</div>`);
for (let i=0; i<firstDay; i++) {
html+=`<div class="calendar-day other-month">${prevMonthDays-firstDay+i+1}</div>`;
}
const todayStr = today();
for (let d=1; d<=daysInMonth; d++) {
const dateStr = formatDate(currentYear, currentMonth, d);
let cls = 'calendar-day';
if (dateStr===todayStr) cls+=' today';
if (checkedDates.has(dateStr)) cls+=' checked';
html+=`<div class="${cls}" data-date="${dateStr}">${d}</div>`;
}
const totalCells = firstDay + daysInMonth;
const remaining = 7 - (totalCells%7);
if (remaining<7) {
for (let i=1; i<=remaining; i++) {
html+=`<div class="calendar-day other-month">${i}</div>`;
}
}
grid.innerHTML = html;
grid.querySelectorAll('.calendar-day:not(.other-month)').forEach(el=>{
el.addEventListener('click', function() {
const date = this.dataset.date;
showDayDetail(date);
});
});
}
function showDayDetail(date) {
const container = document.getElementById('dayDetail');
let html = `<h3 style="margin-bottom:10px;">📌 ${date}的记录</h3>`;
const checkinRecords = [];
data.checkins.forEach(c=>{
c.history.forEach(h=>{
if (h.date===date) {
checkinRecords.push({type:'checkin', name:c.name, ...h});
}
});
});
const todoRecords = [];
data.todos.forEach(t=>{
t.history.forEach(h=>{
if (h.date===date) {
todoRecords.push({type:'todo', text:t.text, ...h});
}
});
});
const freeRecords = data.freeRecords.filter(r=>r.date===date);
if (checkinRecords.length===0 && todoRecords.length===0 && freeRecords.length===0) {
html+='<p style="color:#999;">当天无记录</p>';
} else {
html+='<div>';
const all = [];
checkinRecords.forEach(r=>all.push(r));
todoRecords.forEach(r=>all.push(r));
freeRecords.forEach(r=>{
all.push({type:'free', name:r.name, time:r.startTime, endTime:r.endTime, durationMin:r.durationMin, mood:r.mood, note:r.note});
});
all.sort((a, b)=>a.time.localeCompare(b.time));
all.forEach(r=>{
const moodEmojis = ['😊','🙂','😐','😟','😢'];
const mood = typeof r.mood==='number' ? moodEmojis[r.mood]||'' : '';
const duration = formatDuration(r.durationMin);
let typeLabel = '';
if (r.type==='checkin') typeLabel = '✅ 打卡';
else if (r.type==='todo') typeLabel = '📋 TODO';
else if (r.type==='free') typeLabel = '📝 自由记录';
const nameText = r.type==='free' ? r.name : (r.type==='checkin' ? r.name : r.text);
html+=`
<div class="record-item">
<div class="header">
<span>${typeLabel} ${nameText}</span>
<span class="mood">${mood}</span>
</div>
<div style="font-size:13px;color:#666;">
${r.time}${r.endTime?'-'+r.endTime:''}${duration?' · '+duration:''}
</div>
${r.note?'<div class="note">📝 '+r.note+'</div>':''}
</div>
`;
});
html+='</div>';
}
html+=`<div class="mt-10"><button class="outline" onclick="showDayModal('${date}')">查看完整记录</button></div>`;
container.innerHTML = html;
}
function showDayModal(date) {
const modal = document.getElementById('modalOverlay');
const body = document.getElementById('modalBody');
let html = `<h3>📅 ${date}的完整记录</h3>`;
html+=`<h4>长期打卡</h4>`;
data.checkins.forEach(c=>{
const record = c.history.find(h=>h.date===date);
if (record) {
const moodEmojis = ['😊','🙂','😐','😟','😢'];
const mood = typeof record.mood==='number' ? moodEmojis[record.mood] : '';
const duration = formatDuration(record.durationMin);
html+=`<div class="record-item"><span>✅ ${c.name}</span> ${mood} ${record.time} ${duration}${record.note?'<br>📝 '+record.note:''}</div>`;
} else {
html+=`<div style="color:#999;">⬜ ${c.name} (未打卡)</div>`;
}
});
html+=`<h4>短期任务 TODO</h4>`;
data.todos.forEach(t=>{
const record = t.history.find(h=>h.date===date);
if (record) {
const moodEmojis = ['😊','🙂','😐','😟','😢'];
const mood = typeof record.mood==='number' ? moodEmojis[record.mood] : '';
const duration = formatDuration(record.durationMin);
html+=`<div class="record-item">${t.done?'✅':'⬜'} ${t.text} ${mood} ${record.time} ${duration}${record.note?'<br>📝 '+record.note:''}</div>`;
} else {
html+=`<div style="color:#999;">⬜ ${t.text}</div>`;
}
});
const freeOnDate = data.freeRecords.filter(r=>r.date===date);
if (freeOnDate.length>0) {
html+=`<h4>📝 自由记录</h4>`;
freeOnDate.forEach(r=>{
const moodEmojis = ['😊','🙂','😐','😟','😢'];
const mood = typeof r.mood==='number' ? moodEmojis[r.mood] : '';
const duration = formatDuration(r.durationMin);
html+=`<div class="record-item"><span>📝 ${r.name}</span> ${mood} ${r.startTime}-${r.endTime} ${duration}${r.note?'<br>📝 '+r.note:''}</div>`;
});
}
html+=`<div class="mt-10"><button onclick="closeModal()">关闭</button></div>`;
body.innerHTML = html;
modal.classList.add('show');
}
function closeModal() {
document.getElementById('modalOverlay').classList.remove('show');
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
if (e.target===this) closeModal();
});
document.getElementById('prevMonth').addEventListener('click', ()=>{
currentMonth--;
if (currentMonth<1) { currentMonth=12; currentYear--; }
renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', ()=>{
currentMonth++;
if (currentMonth>12) { currentMonth=1; currentYear++; }
renderCalendar();
});
// ============================================================
// 3. 长期打卡功能
// ============================================================
function renderCheckins() {
const list = document.getElementById('checkinList');
if (data.checkins.length===0) {
list.innerHTML = '<p style="color:#999;text-align:center;">暂无长期打卡，添加一个吧</p>';
return;
}
let html = '';
data.checkins.forEach((c, idx)=>{
const todayStr = today();
const todayRecord = c.history.find(h=>h.date===todayStr);
const totalDays = c.history.length;
let streak = 0;
let d = new Date();
while (true) {

function renderTodos() {
const list = document.getElementById('todoList');
const todayStr = today();
const relevant = data.todos.filter(t=>{
if (t.done && t.history.some(h=>h.date===todayStr)) return true;
if (!t.done && t.deadline && t.deadline>=todayStr) return true;
if (!t.done && !t.deadline) return true;
return false;
});
relevant.sort((a, b)=>{
if (a.done !== b.done) return a.done ? 1 : -1;
return b.createdDate.localeCompare(a.createdDate) || b.id-a.id;
});
if (relevant.length===0) {
list.innerHTML = '<p style="color:#999;text-align:center;">今日暂无任务</p>';
return;
}
let html = '';
relevant.forEach(t=>{
const realIdx = data.todos.indexOf(t);
const todayRecord = t.history.find(h=>h.date===todayStr);
const isDone = t.done;
let deadlineText = '';
if (t.deadline) {
const daysLeft = Math.ceil((new Date(t.deadline) - new Date())/(1000*60*60*24));
if (daysLeft>0) deadlineText = `剩余${daysLeft}天`;
else if (daysLeft===0) deadlineText = '今天截止';
else deadlineText = '已过期';

const moodEmojis = ['😊','🙂','😐','😟','😢'];
const moodIcon = todayRecord && typeof todayRecord.mood==='number' ? moodEmojis[todayRecord.mood] : '';

<div class="info">
<div class="name${isDone?' todo-done':''}" style="${!isDone && t.deadline && new Date(t.deadline)<new Date()?'color:#f44336;':''}">
${t.text}
</div>
<div class="meta">

</div>
`;
});

<button class="timer-opt" data-min="60">60分钟</button>
</div>
<p style="margin:12px 0;color:#999;">— 或 —</p>
<button class="fs-btn secondary" id="freeStartStopwatch" style="width:100%;">正计时</button>
<div style="margin-top:16px;">
<button class="fs-btn danger" style="background:transparent;color:#999;border:none;" onclick="showFreeRecordModeSelect('${name}')">← 返回</button>
</div>
</div>
`;
body.querySelectorAll('.timer-opt').forEach(btn=>{
btn.addEventListener('click', function() {
const minutes = parseInt(this.dataset.min);
startCountdown(name, minutes);
});
});
document.getElementById('freeStartStopwatch').addEventListener('click', function() {
startStopwatch(name);
});
}
// 计时器全局变量
let _timerStartTime = null;
let _timerEndTime = null;
let _timerMode = null;
let _timerTotalSeconds = 0;
function startCountdown(name, minutes) {
const body = freeRecordBody;
_timerMode = 'countdown';
_timerStartTime = new Date();
_timerTotalSeconds = minutes*60;
_timerEndTime = new Date(_timerStartTime.getTime() + _timerTotalSeconds*1000);
body.innerHTML = `
<div style="width:100%;max-width:400px;text-align:center;">
<h3 style="margin-bottom:4px;">⏱️ ${name}</h3>
<p style="color:#888;margin-bottom:8px;">倒计时${minutes}分钟</p>
<div class="timer-display" id="timerDisplay">${formatTimer(_timerTotalSeconds)}</div>
<div class="timer-bar"><div class="timer-bar-inner" id="timerBarInner" style="width:100%;"></div></div>
<p style="font-size:13px;color:#999;margin-bottom:16px;">开始时间: ${formatTimeForDisplay(_timerStartTime)}</p>
<button class="fs-btn primary" id="timerComplete" style="width:100%;">✅ 完成</button>
</div>
`;
document.getElementById('timerComplete').addEventListener('click', function() {
completeTimer(name);
});
if (window._freeTimerInterval) clearInterval(window._freeTimerInterval);
window._freeTimerInterval = setInterval(()=>{
const now = new Date();
const remaining = Math.max(0, Math.floor((_timerEndTime.getTime() - now.getTime())/1000));
document.getElementById('timerDisplay').textContent = formatTimer(remaining);
const pct = (remaining / _timerTotalSeconds) * 100;
document.getElementById('timerBarInner').style.width = pct+'%';
if (remaining<=0) {
clearInterval(window._freeTimerInterval);
window._freeTimerInterval = null;
completeTimer(name);
}
}, 1000);
}
function startStopwatch(name) {
const body = freeRecordBody;
_timerMode = 'stopwatch';
_timerStartTime = new Date();
_timerTotalSeconds = 0;
body.innerHTML = `
<div style="width:100%;max-width:400px;text-align:center;">
<h3 style="margin-bottom:4px;">⏱️ ${name}</h3>
<p style="color:#888;margin-bottom:8px;">正计时中</p>
<div class="timer-display" id="timerDisplay">00:00:00</div>
<p style="font-size:13px;color:#999;margin-bottom:16px;">开始时间: ${formatTimeForDisplay(_timerStartTime)}</p>
<button class="fs-btn primary" id="timerComplete" style="width:100%;">✅ 完成</button>
</div>
`;
document.getElementById('timerComplete').addEventListener('click', function() {
completeTimer(name);
});
if (window._freeTimerInterval) clearInterval(window._freeTimerInterval);
window._freeTimerInterval = setInterval(()=>{
const now = new Date();
const elapsed = Math.floor((now.getTime() - _timerStartTime.getTime())/1000);
_timerTotalSeconds = elapsed;
document.getElementById('timerDisplay').textContent = formatTimer(elapsed);
}, 1000);
}
function formatTimer(seconds) {
const h = Math.floor(seconds/3600);
const m = Math.floor((seconds%3600)/60);
const s = seconds%60;
return (h+'').padStart(2,'0')+':'+(m+'').padStart(2,'0')+':'+(s+'').padStart(2,'0');
}
function formatTimeForDisplay(date) {
return date.getHours().toString().padStart(2,'0')+':'+date.getMinutes().toString().padStart(2,'0');
}
function completeTimer(name) {
if (window._freeTimerInterval) {
clearInterval(window._freeTimerInterval);
window._freeTimerInterval = null;
}
const endTime = new Date();
const startStr = formatTimeForDisplay(_timerStartTime);
const endStr = formatTimeForDisplay(endTime);
let durationSec = 0;
if (_timerMode==='countdown') {
durationSec = Math.min(_timerTotalSeconds, Math.floor((endTime.getTime() - _timerStartTime.getTime())/1000));
} else {
durationSec = Math.floor((endTime.getTime() - _timerStartTime.getTime())/1000);
}
const durationMin = Math.round(durationSec/60);
showFreeCompleteForm(name, startStr, endStr, durationMin);
}
// 完成填写页面
function showFreeCompleteForm(name, autoStart, autoEnd, autoDuration) {
const body = freeRecordBody;
const todayStr = today();
const nowTimeStr = nowTime();
const defaultStart = autoStart || nowTimeStr;
const defaultEnd = autoEnd || '';
body.innerHTML = `
<div style="width:100%;max-width:400px;">
<h3 style="text-align:center;margin-bottom:4px;">✅ ${name}</h3>
<p style="text-align:center;color:#888;margin-bottom:16px;font-size:13px;">${todayStr}</p>
<p style="font-weight:600;margin-bottom:6px;">心情</p>
<div class="mood-buttons" id="freeMoodButtons">
<button class="mood-btn" data-mood="0">😊</button>
<button class="mood-btn" data-mood="1">🙂</button>
<button class="mood-btn" data-mood="2">😐</button>
<button class="mood-btn" data-mood="3">😟</button>
<button class="mood-btn" data-mood="4">😢</button>
</div>
<div class="mt-10">
<label style="font-weight:600;">开始时间</label>
<input type="time" id="freeStartTime" value="${defaultStart}" />
</div>
<div class="mt-10">
<label style="font-weight:600;">结束时间</label>
<input type="time" id="freeEndTime" value="${defaultEnd}" />
</div>
${autoDuration?`<p style="font-size:13px;color:#4caf50;margin-top:4px;">⏱️ 时长: ${formatDuration(autoDuration)}</p>`:''}
<div class="mt-10">
<label>文字备注</label>
<textarea id="freeNote" placeholder=""></textarea>
</div>
<div class="mt-10 flex-between">
<button class="fs-btn danger" style="background:#f44336;color:white;" onclick="closeFreeRecord()">取消</button>
<button class="fs-btn primary" id="saveFreeRecord">保存记录</button>
</div>
</div>
`;
let selectedMood = null;
body.querySelectorAll('.mood-btn').forEach(btn=>{
btn.addEventListener('click', function() {
body.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
this.classList.add('selected');
selectedMood = parseInt(this.dataset.mood);
});
});
document.getElementById('saveFreeRecord').addEventListener('click', function() {
if (selectedMood===null) { alert('请选择心情'); return; }
const startVal = document.getElementById('freeStartTime').value;
const endVal = document.getElementById('freeEndTime').value;
if (!startVal || !endVal) { alert('请填写开始时间和结束时间'); return; }
const [sh,sm] = startVal.split(':').map(Number);
const [eh,em] = endVal.split(':').map(Number);
const startMinutes = sh*60+sm;
const endMinutes = eh*60+em;
if (!autoStart) {
const beijingNow = getBeijingNow();
if (endMinutes > beijingNow) {
alert('错误：结束时间不能大于当前时间！请检查输入的时间是否正确。');
return;
}
}
let durationMin = endMinutes - startMinutes;
if (durationMin<0) durationMin += 24*60;
if (autoDuration && autoDuration>durationMin) {
durationMin = autoDuration;
}
const note = document.getElementById('freeNote').value.trim();
const record = {
id: genId(),
name: name,
date: todayStr,
startTime: startVal,
endTime: endVal,
durationMin: durationMin,
mood: selectedMood,
note: note,
createdBy: 'freeRecord'
};
data.freeRecords.push(record);
saveData();
alert('✅ 记录已保存！');
closeFreeRecord();
renderCalendar();
showDayDetail(todayStr);
});
}
// 查看记录详情（查看功能已删除，保留编辑用）

document.getElementById('freeRecordTitle').textContent = '✏️ 编辑记录';

</div>
</div>
`;
let selectedMood = r.mood;
body.querySelectorAll('.mood-btn').forEach(btn=>{
btn.addEventListener('click', function() {
body.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
this.classList.add('selected');
selectedMood = parseInt(this.dataset.mood);
});
});
document.getElementById('saveEditFreeRecord').addEventListener('click', function() {
if (selectedMood===null) { alert('请选择心情'); return; }
const startVal = document.getElementById('editFreeStart').value;
const endVal = document.getElementById('editFreeEnd').value;
if (!startVal || !endVal) { alert('请填写开始和结束时间'); return; }
const [sh,sm] = startVal.split(':').map(Number);
const [eh,em] = endVal.split(':').map(Number);
const startMinutes = sh*60+sm;
const endMinutes = eh*60+em;
let durationMin = endMinutes - startMinutes;
if (durationMin<0) durationMin += 24*60;
const note = document.getElementById('editFreeNote').value.trim();
r.mood = selectedMood;
r.startTime = startVal;
r.endTime = endVal;
r.durationMin = durationMin;
r.note = note;
saveData();
alert('✅ 修改已保存！');
document.getElementById('freeRecordTitle').textContent = '📝 记录';
showRecordMainView();
renderCalendar();
showDayDetail(today());
});
}
function deleteFreeRecordInFlow(idx) {
if (!confirm('确认删除此记录？')) return;
data.freeRecords.splice(idx, 1);
saveData();
showRecordMainView();
renderCalendar();
showDayDetail(today());
}
// ============================================================
// 8. 初始化
// ============================================================
loadData();
renderCalendar();
renderCheckins();
renderTodos();
document.querySelector('[data-tab="calendar"]').click();
</script>
